<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
<rect width="100%" height="100%" fill="#ffffff"/>
<text x="28" y="38" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#111827" text-anchor="start">Output export structure</text>
<text x="28" y="62" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="400" fill="#64748b" text-anchor="start">Derived outputs are organized for audit, diagnostics, and paper-ready reporting.</text>
