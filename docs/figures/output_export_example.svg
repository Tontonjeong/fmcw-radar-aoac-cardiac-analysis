<rect x="50" y="105" width="860" height="230" rx="8" fill="white" stroke="#e5e7eb"/>
<text x="64" y="129" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="start">Export tree</text>
<line x1="62" y1="309" x2="898" y2="309" stroke="#e5e7eb" stroke-width="1.0"/>
<text x="90" y="150" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="start">results/ex1(...)/</text><text x="130" y="185" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#2563eb" text-anchor="start">├── beat-wise CSV tables</text><text x="130" y="215" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#16a34a" text-anchor="start">├── summary JSON metrics</text><text x="130" y="245" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#f97316" text-anchor="start">├── diagnostic figures</text><text x="130" y="275" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#dc2626" text-anchor="start">└── paper_export/</text><text x="180" y="305" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#64748b" text-anchor="start">├── compact figures   └── rendered table PNGs</text><defs><marker id="arrow-752916" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L7,3 z" fill="#2563eb"/></marker></defs>
<line x1="510" y1="175" x2="700" y2="175" stroke="#2563eb" stroke-width="1.7" marker-end="url(#arrow-752916)"/><text x="710" y="180" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#2563eb" text-anchor="start">analysis audit</text><defs><marker id="arrow-592008" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L7,3 z" fill="#dc2626"/></marker></defs>
<line x1="510" y1="260" x2="700" y2="260" stroke="#dc2626" stroke-width="1.7" marker-end="url(#arrow-592008)"/><text x="710" y="265" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#dc2626" text-anchor="start">paper/report use</text>
<rect x="50" y="365" width="860" height="45" rx="8" fill="white" stroke="#e5e7eb"/>
<text x="64" y="389" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="start">Policy</text>
<line x1="62" y1="384" x2="898" y2="384" stroke="#e5e7eb" stroke-width="1.0"/>
<text x="80" y="394" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#64748b" text-anchor="start">Raw biosignal data and PDFs are excluded by default; commit derived docs/code, not private recordings.</text>
<rect x="44" y="472" width="420" height="34" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
<text x="58" y="495" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#2563eb" text-anchor="start">CSV / JSON / figures / paper_export</text>
<text x="488" y="492" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#64748b" text-anchor="start">Figure: export folders separate derived research artifacts from raw private data.</text>
</svg>