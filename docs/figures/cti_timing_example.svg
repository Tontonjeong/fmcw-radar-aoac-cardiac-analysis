<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
<rect width="100%" height="100%" fill="#ffffff"/>
<text x="28" y="38" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#111827" text-anchor="start">CTI timing example</text>
<text x="28" y="62" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="400" fill="#64748b" text-anchor="start">ECG Q/R/T and AO/AC candidate landmarks define PEP, LVET, and QS2.</text>
<rect x="28" y="78" width="904" height="380" rx="12" fill="#f8fafc" stroke="#e5e7eb"/>
<rect x="50" y="105" width="860" height="200" rx="8" fill="white" stroke="#e5e7eb"/>
<text x="64" y="129" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="start">Beat-relative timeline</text>
<line x1="62" y1="279" x2="898" y2="279" stroke="#e5e7eb" stroke-width="1.0"/>
<line x1="110" y1="200" x2="850" y2="200" stroke="#e5e7eb" stroke-width="2"/><circle cx="180.0" cy="200.0" r="5" fill="#16a34a" stroke="white" stroke-width="2"/>
<text x="180" y="190" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#16a34a" text-anchor="middle">Q</text><circle cx="330.0" cy="200.0" r="5" fill="#dc2626" stroke="white" stroke-width="2"/>
<text x="330" y="190" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#dc2626" text-anchor="middle">R</text><circle cx="710.0" cy="200.0" r="5" fill="#7c3aed" stroke="white" stroke-width="2"/>
<text x="710" y="190" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#7c3aed" text-anchor="middle">T</text><circle cx="430.0" cy="200.0" r="5" fill="#f97316" stroke="white" stroke-width="2"/>
<text x="430" y="190" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#f97316" text-anchor="middle">AO</text><circle cx="650.0" cy="200.0" r="5" fill="#f97316" stroke="white" stroke-width="2"/>
<text x="650" y="190" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#f97316" text-anchor="middle">AC</text><line x1="180" y1="230" x2="430" y2="230" stroke="#2563eb" stroke-width="4"/><text x="305" y="248" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#2563eb" text-anchor="middle">PEP</text><line x1="430" y1="260" x2="650" y2="260" stroke="#16a34a" stroke-width="4"/><text x="540" y="278" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#16a34a" text-anchor="middle">LVET</text><line x1="180" y1="290" x2="650" y2="290" stroke="#7c3aed" stroke-width="4"/><text x="415" y="308" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#7c3aed" text-anchor="middle">QS2</text>
<rect x="50" y="340" width="860" height="60" rx="8" fill="white" stroke="#e5e7eb"/>
<text x="64" y="364" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="start">Equations</text>
<line x1="62" y1="374" x2="898" y2="374" stroke="#e5e7eb" stroke-width="1.0"/>
<text x="80" y="374" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#2563eb" text-anchor="start">PEP=t_AO-t_Q,  LVET=t_AC-t_AO,  QS2=t_AC-t_Q</text>
<rect x="44" y="472" width="420" height="34" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
<text x="58" y="495" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#2563eb" text-anchor="start">beat-relative τ=t-R_i</text>
<text x="488" y="492" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#64748b" text-anchor="start">Figure: intervals are timing-analysis quantities, not clinical claims.</text>
</svg>